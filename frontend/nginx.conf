# Nginx vhost for the Angular SPA + backend proxy.
#
# This container sits behind Caddy (which terminates TLS) on the docker network,
# so this config is HTTP-only. Caddy forwards X-Forwarded-Proto=https and the
# backend's ForwardedHeaders middleware rewrites the request scheme on the way
# through.

server {
    listen       80;
    server_name  _;

    # Root of the Angular build output copied in by the Dockerfile.
    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip — Caddy handles brotli edge-side but enabling gzip here means cached
    # responses from internal services also compress on the fly.
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   512;
    gzip_types        text/plain text/css text/javascript application/javascript application/json image/svg+xml font/ttf font/otf;
    gzip_vary         on;
    gzip_proxied      any;

    # Security headers — mirrored here so same-origin requests still benefit
    # even if someone reaches this container directly (e.g., debug port-forward).
    # Caddy adds HSTS at the edge because HSTS must only apply over HTTPS.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # Cache policy:
    #   * Hashed assets (main.ABC123.js, styles.ABC123.css) get 1-year immutable.
    #   * index.html must NEVER cache (otherwise deploys don't land until a forced
    #     reload). This is the canonical Angular SPA cache strategy.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # Reverse proxy for API calls. `backend` is the service name in
    # docker-compose.yml — docker's internal DNS resolves it to the backend
    # container's IP on the shared bridge network.
    #
    # The trailing slash on `proxy_pass http://backend:8080/` is important: it
    # strips the /api prefix so the backend sees /game/active instead of
    # /api/game/active. Matches the controller routes which are [Route("api/...")]
    # — wait, they ARE [Route("api/[controller]")] so we MUST keep the /api prefix.
    # Therefore we proxy WITHOUT stripping: proxy_pass http://backend:8080 (no slash).
    location /api/ {
        proxy_pass              http://backend:8080;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";

        # Bounded timeouts so a slow Riot API upstream can't pile up nginx workers.
        proxy_connect_timeout   5s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;

        # Don't buffer the whole response before sending — builds are small but
        # the streaming behavior helps the browser start parsing JSON earlier.
        proxy_buffering         off;
    }

    # Health probe endpoint exposed for container orchestration without going
    # through the Angular router. Direct passthrough to the backend.
    location = /health {
        access_log off;
        proxy_pass              http://backend:8080/health;
        proxy_connect_timeout   2s;
        proxy_read_timeout      3s;
    }

    # SPA fallback — any URL the Angular router owns should return index.html
    # so the client-side router can handle it. Must come LAST so it doesn't
    # shadow the /api/ and asset blocks above.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
