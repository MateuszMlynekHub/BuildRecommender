    <!-- ==========================================================================
       Google Analytics (gtag.js) — GA4 measurement ID G-B352Q2V3CW
       ==========================================================================
       GDPR compliance via Google Consent Mode v2:
         1. dataLayer + gtag stub defined FIRST so every subsequent call queues
            properly even before gtag.js finishes downloading.
         2. gtag('consent', 'default', ...) sets ALL consent signals to DENIED.
            This MUST run before gtag.js loads AND before gtag('config', ...),
            otherwise GA starts collecting in granted mode for a few ms.
         3. An inline script reads localStorage and restores the user's previous
            choice synchronously — if they already accepted last visit, their
            consent re-grants BEFORE the first page_view fires, so we don't
            double-count or lose data.
         4. If no stored choice: defaults stay denied, the CookieConsentComponent
            shows the banner, and user's click triggers gtag('consent', 'update').
         5. Angular router NavigationEnd listener in app.ts keeps SPA pageviews
            flowing through GA on route changes.

       The `wait_for_update` value tells GA to hold back any events for up to
       500 ms waiting for a possible consent update — that window is how the
       inline localStorage restore avoids a "denied then immediately granted"
       flicker in GA Realtime.
       -->
    <script>
      // Step 1: define dataLayer + gtag stub before the async GA script loads.
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      // Step 2: declare ALL consent signals as denied until the user explicitly
      // consents. This is the foundation of a GDPR-valid GA deployment.
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        wait_for_update: 500,
      });

      // Step 3: if the user previously made a choice (stored by ConsentService
      // in localStorage under the key 'draftsense:consent'), restore it NOW —
      // synchronously, before gtag.js ever fires its first page_view. This is
      // the only way to avoid losing the initial pageview for returning users
      // who already consented on a previous visit.
      try {
        var stored = JSON.parse(localStorage.getItem('draftsense:consent') || 'null');
        if (stored && (stored.status === 'accepted' || stored.status === 'rejected')) {
          var state = stored.status === 'accepted' ? 'granted' : 'denied';
          gtag('consent', 'update', {
            ad_storage: state,
            ad_user_data: state,
            ad_personalization: state,
            analytics_storage: state,
          });
        }
      } catch (e) {
        // localStorage blocked (private mode, 3rd-party cookie policies) — defaults
        // stay denied, the banner will appear, user can still make a choice.
      }
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B352Q2V3CW"></script>
    <script>
      // Step 4: standard gtag init. If Step 3 restored 'granted' from storage, this

      // Mode v2 expires the wait (500 ms) or the user clicks accept in the banner.
      gtag('js', new Date());
      gtag('config', 'G-B352Q2V3CW');
    </script>
