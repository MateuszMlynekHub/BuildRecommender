<!--
  Top navigation — fixed at the top of the viewport, globally visible on
  every route. Pairs with the fixed footer to bookend the app chrome.
  Page content (router-outlet) is offset down by the nav height via
  `:host { padding-top }` in app.scss.
-->
<app-nav-menu />

<router-outlet />

<!--
  Persistent, always-visible footer. Fixed at the bottom of the viewport so it
  never scrolls out of view — users can switch language, review cookies, or
  support the project from any point in the app without scrolling to the bottom
  of a long build panel first.

  The body gets `padding-bottom: 2.5rem` in app.scss so page content never
  hides under the fixed bar. The bar itself is translucent (backdrop blur)
  so the Summoner's Rift splash background on the home route still bleeds
  through, keeping the aesthetic consistent.

  Structure — semantic <footer> with role=contentinfo (implicit). Left side
  is the Buy-me-a-coffee CTA, right side holds the Cookies link + language
  switcher. On narrow screens they stack via flex-wrap; the switcher and
  cookies button stay grouped together because they're both meta-actions.
-->
<footer class="app-footer">
  <div class="app-footer__inner">
    <p class="app-footer__text">
      {{ 'footer.coffee.cta' | t }}
      <a
        href="https://buymeacoffee.com/mateuszmlynek"
        target="_blank"
        rel="noopener noreferrer"
        class="app-footer__link"
        [attr.aria-label]="'footer.coffee.button' | t"
      >
        <!-- Inline coffee-cup glyph — ~200 bytes, zero external requests,
             inherits color from the link so hover pulses the icon naturally. -->
        <svg
          class="app-footer__icon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="14"
          height="14"
          fill="currentColor"
          aria-hidden="true"
          focusable="false"
        >
          <path d="M18.5 3H4v11a5 5 0 0 0 5 5h4a5 5 0 0 0 5-5v-1h.5a3.5 3.5 0 0 0 0-7zM16 14a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3V5h10v9zm2.5-3H18V7h.5a2 2 0 0 1 0 4zM4 21h14v2H4v-2z"/>
        </svg>
        <span>{{ 'footer.coffee.button' | t }}</span>
      </a>
    </p>
    <div class="app-footer__meta">
      <!-- "Cookies" re-opens the consent banner so users can change their
           choice at any time. Required by GDPR — consent must be as easy to
           withdraw as it is to give. -->
      <button
        type="button"
        class="app-footer__cookies"
        (click)="consent.manageCookies()"
      >
        {{ 'footer.cookies' | t }}
      </button>
      <app-language-switcher />
    </div>
  </div>
</footer>

<!-- GDPR cookie consent banner. Renders conditionally based on
     ConsentService.visible (true on first visit or when user re-opens via
     the Cookies button in the footer). -->
<app-cookie-consent />
